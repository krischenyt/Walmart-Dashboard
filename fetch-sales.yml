name: Fetch Walmart Sales Data

on:
  schedule:
    - cron: '0 2 * * *'  # 每天 UTC 02:00（台灣時間 10:00）
  workflow_dispatch:       # 手動觸發

permissions:
  contents: write

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: scripts

      - name: Fetch Walmart sales data
        env:
          WALMART_CLIENT_ID: ${{ secrets.WALMART_CLIENT_ID }}
          WALMART_CLIENT_SECRET: ${{ secrets.WALMART_CLIENT_SECRET }}
        run: node fetch-sales.js
        working-directory: scripts

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "📊 Auto-update sales data $(date +'%Y-%m-%d')"
          git push
